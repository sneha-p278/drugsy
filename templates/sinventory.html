<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTrace - Inventory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1e88e5;
            --white: #ffffff;
            --text-gray: #546e7a;
            --border-color: #e3f2fd;
            --red: #ef5350;
            --yellow: #ffa726;
            --green: #66bb6a;
            --shadow-sm: 0 2px 4px rgba(30, 136, 229, 0.1);
            --shadow-md: 0 4px 6px rgba(30, 136, 229, 0.15);
            --shadow-lg: 0 8px 16px rgba(30, 136, 229, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: #f8fafc;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background: var(--white);
            padding: 24px;
            box-shadow: var(--shadow-md);
            border-right: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding: 8px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .logo:hover {
            background: #e3f2fd;
        }

        .logo img {
            width: 48px;
            height: 48px;
            background: var(--primary-color);
            border-radius: 12px;
            padding: 10px;
            box-shadow: var(--shadow-sm);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
        }

        .logo-subtitle {
            font-size: 13px;
            color: var(--primary-color);
            font-weight: 500;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-gray);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .menu-item:hover {
            background: #e3f2fd;
            color: var(--primary-color);
        }

        .menu-item.active {
            background: var(--primary-color);
            color: var(--white);
            box-shadow: var(--shadow-md);
        }

        .menu-item i {
            margin-right: 12px;
            width: 24px;
            font-size: 18px;
        }

        .main {
            margin-left: 280px;
            padding: 32px;
            max-width: 1400px;
        }


        .inventory-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 32px;
            background: linear-gradient(45deg, #1e88e5, #64b5f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .upload-preview {
            width: 400px;
            height: 280px;
            border: 3px dashed var(--primary-color);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .upload-preview:hover {
            transform: translateY(-4px);
            border-color: #64b5f6;
            box-shadow: var(--shadow-lg);
        }

        .upload-preview i {
            font-size: 64px;
            color: var(--primary-color);
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .upload-preview:hover i {
            transform: scale(1.1);
        }

        .upload-text {
            color: var(--text-gray);
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            line-height: 1.5;
        }

        .verification-section {
            max-width: 500px;
            margin: 0 auto;
            display: none;
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            padding: 32px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .verification-title {
            text-align: center;
            margin-bottom: 24px;
            color: var(--primary-color);
            font-size: 20px;
            font-weight: 600;
        }

        .digit-input-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .digit-input {
            width: 56px;
            height: 64px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: var(--primary-color);
            transition: all 0.3s ease;
            background: white;
        }

        .digit-input:focus {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-sm);
            outline: none;
            transform: translateY(-2px);
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), #64b5f6);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
                padding: 20px 10px;
            }

            .logo-text, .logo-subtitle {
                display: none;
            }

            .menu-item span {
                display: none;
            }

            .main-content {
                margin-left: 80px;
                padding: 20px;
            }

            .upload-preview {
                width: 100%;
                max-width: 320px;
                height: 220px;
            }

            .digit-input {
                width: 40px;
                height: 48px;
                font-size: 20px;
            }

            #video {
                width: 100%;
                max-width: 600px;
                height: auto;
                border: 2px solid #ddd;
                background-color: #fff;
            }

            #qr-canvas {
                width: 100%;
                height: auto;
                display: none;
                border: 2px solid #ddd;
            }
            .qr-details {
                margin-top: 20px;
            }
            #scan-result {
                font-weight: bold;
            }
            .camera-section {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <img src="/api/placeholder/40/40" alt="MedTrace Logo">
            <div>
                <div class="logo-text">MedTrace</div>
                <div class="logo-subtitle">Retailer Portal</div>
            </div>
        </div>
        <div class="menu-item" onclick="window.location.href='{{ url_for('sdashboard') }}';">
            <i class="fas fa-chart-line"></i>
            Dashboard
        </div>
        <div class="menu-item active" onclick="window.location.href='{{ url_for('sinventory') }}';">
            <i class="fas fa-box"></i>
            Inventory
        </div>
        <div class="menu-item" onclick="window.location.href='{{ url_for('sprofile') }}';">
            <i class="fas fa-user"></i>
            Profile
        </div>
        <div class="menu-item" onclick="window.location.href='{{ url_for('snotification') }}';">
            <i class="fas fa-bell"></i>
            Notifications
        </div>
    </div>

    <div class="main">
        <!-- Upload QR Code Section -->
        <div class="upload-section">
            <h3>Upload QR Code Image</h3>
            <input type="file" id="qr-upload" accept="image/*">
        </div>

        <!-- Camera QR Code Section -->
        <div class="camera-section">
            <h3>Or Scan QR Code Using Camera</h3>
            <video id="video" autoplay></video>
            <canvas id="qr-canvas" width="400" height="400"></canvas>
        </div>

        <!-- Display Scanned QR Code Data -->
        <div class="qr-details">
            <h4>Scanned QR Code Data:</h4>
            <p id="scan-result">Upload or scan a QR code to see the data here.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script>
        // Access the video stream for the camera QR code scanner
        const video = document.getElementById('video');
        const canvas = document.getElementById('qr-canvas');
        const context = canvas.getContext('2d');
        const scanResultElement = document.getElementById('scan-result');
        
        // Start the camera and begin scanning QR codes
        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then((stream) => {
                    video.srcObject = stream;
                    video.style.display = "block";
                    requestAnimationFrame(scanQRCode);
                })
                .catch((err) => {
                    console.error("Error accessing camera: ", err);
                    scanResultElement.innerText = "Unable to access camera.";
                });
        }

        let isProcessing = false;
        async function processCode(codeData) {
            if (isProcessing) return;
            isProcessing = true;
            scanResultElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Securely decrypting...';
            
            try {
                const response = await fetch('/decrypt_qr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ encrypted: codeData })
                });
                const result = await response.json();
                
                if (result.success) {
                    const data = result.decrypted;
                    let drugsListHTML = "";
                    if (data.drugs && data.drugs.length > 0) {
                        data.drugs.forEach(d => {
                            drugsListHTML += `<li><b>${d.drugName}</b> (ID: ${d.drugId}) - Units: ${d.units || 100}</li>`;
                        });
                    } else if (data.drugName) {
                        drugsListHTML += `<li><b>${data.drugName}</b> (ID: ${data.drugId || 'N/A'})</li>`;
                    }
                    
                    scanResultElement.innerHTML = `
                        <div style="background:#e8f5e9; padding:15px; border-radius:10px; border:1px solid #c8e6c9; margin-top:10px; text-align: left;">
                            <strong style="color:#2e7d32;"><i class="fas fa-shield-check"></i> Decrypted Authentic Details</strong><br><br>
                            <b>Destination Pharmacy:</b> ${data.pharmacyName}<br>
                            <b>Email:</b> ${data.email}<br><br>
                            <b>Items Received:</b>
                            <ul style="margin-top: 5px; padding-left: 20px;">
                                ${drugsListHTML}
                            </ul>
                        </div>
                    `;
                    
                    fetch('/add_inventory', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    }).then(r => r.json()).then(res => {
                        if(res.success) {
                            const msg = document.createElement('div');
                            msg.innerHTML = '<div style="margin-top: 10px; padding: 10px; background: #e3f2fd; border-radius: 8px; color: #1e88e5; text-align: center; font-weight: bold;"><i class="fas fa-check-circle"></i> Successfully tracking in Inventory Dashboard!</div>';
                            scanResultElement.appendChild(msg);
                        }
                    }).catch(console.error);

                    setTimeout(() => { isProcessing = false; }, 3000);
                } else {
                    scanResultElement.innerHTML = `<span style="color:var(--red);"><i class="fas fa-times-circle"></i> Error: ${result.error}</span>`;
                    setTimeout(() => { isProcessing = false; }, 3000);
                }
            } catch (err) {
                scanResultElement.innerHTML = `<span style="color:var(--red);"><i class="fas fa-exclamation-triangle"></i> Network error during secure decryption.</span>`;
                setTimeout(() => { isProcessing = false; }, 3000);
            }
        }

        // Scan QR Code from the video stream
        function scanQRCode() {
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, canvas.width, canvas.height);

            if (code) {
                processCode(code.data);
            } else if (!isProcessing) {
                scanResultElement.innerHTML = "Scanning for secure QR codes...";
            }

            requestAnimationFrame(scanQRCode); // Keep scanning
        }

        // Handle file upload and scan QR code
        document.getElementById('qr-upload').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function (event) {
                const img = new Image();
                img.onload = function () {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    context.drawImage(img, 0, 0);
                    const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, canvas.width, canvas.height);
                    
                    if (code) {
                        processCode(code.data);
                    } else {
                        scanResultElement.innerHTML = "No QR code detected.";
                    }
                };
                img.src = event.target.result;
            };
            
            reader.readAsDataURL(file);
        });

        // Start camera scanning when the page loads
        window.onload = startCamera;
    </script>

</body>
</html>
